name: CI

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: 25.0
          cache: maven

      - name: Build with Maven
        run: ./mvnw -B -DskipTests clean package
